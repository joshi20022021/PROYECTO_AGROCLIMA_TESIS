services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       agroclima
      POSTGRES_USER:     agroclima
      POSTGRES_PASSWORD: agroclima2024
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroclima"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
